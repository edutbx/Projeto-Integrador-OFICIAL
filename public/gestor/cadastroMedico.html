<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="/assets/cadastro.css">
    <title>Cadastro Completo de Médico</title>
</head>

<body>
    <header class="main-header">
        <div class="logo">
            <a href="/index.html"><img src="/assets/img/logocolorida.svg" alt="Logo"></a>
        </div>
    </header>

    <div class="container">
        <div class="progress-bar">
            <div class="progress-step active" id="pStep1">1</div>
            <div class="progress-line" id="pLine1-2"></div>
            <div class="progress-step" id="pStep2">2</div>
            <div class="progress-line" id="pLine2-3"></div>
            <div class="progress-step" id="pStep3">3</div>
        </div>

        <form class="wide-form" id="cadastroMedicoForm">
            <!-- Parte 1: Dados Pessoais e de Login -->
            <div class="form-part active" id="part1">
                <h2>Dados Pessoais e de Login</h2>
                <div class="form-grid">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nome">Nome:</label>
                            <div class="custome-input">
                                <input type="text" id="nome" name="nomeMedico" placeholder="Nome do médico" required>
                                <i class='bx bx-user'></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="sobrenome">Sobrenome:</label>
                            <div class="custome-input">
                                <input type="text" id="sobrenome" name="sobrenomeMedico" placeholder="Sobrenome do médico" required>
                                <i class='bx bx-user'></i>
                            </div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="cpfLogin">CPF (para Login):</label>
                            <div class="custome-input">
                                <input type="text" id="cpfLogin" name="cpfLogin" placeholder="CPF para acesso ao sistema" required>
                                <i class='bx bx-notepad'></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="cpf_medico">CPF do Médico:</label>
                            <div class="custome-input">
                                <input type="text" id="cpf_medico" name="cpfMedico" placeholder="CPF do profissional" required>
                                <i class='bx bx-id-card'></i>
                            </div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="rg">RG:</label>
                            <div class="custome-input">
                                <input type="text" id="rg" name="rgMedico" placeholder="RG do médico" required>
                                <i class='bx bx-id-card'></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="nascimento">Data de Nascimento:</label>
                            <div class="custome-input">
                                <input type="date" id="nascimento" name="dataNascMedico" required>
                                <i class='bx bx-calendar'></i>
                            </div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="sexo">Sexo:</label>
                            <div class="custome-input">
                                <select id="sexo" name="sexoMedico" required>
                                    <option value="">Selecione</option>
                                    <option value="M">Masculino</option>
                                    <option value="F">Feminino</option>
                                    <option value="O">Outro</option>
                                </select>
                                <i class='bx bx-body'></i>
                            </div>
                        </div>
                         <div class="form-group">
                            <!-- Espaço reservado ou outro campo se necessário -->
                        </div>
                    </div>
                </div>
                <div class="form-footer">
                    <button class="login" onclick="location.href='home.html'">Voltar</button>
                    <button type="button" class="login" id="nextToPart2">Continuar</button>
                </div>
            </div>

            <!-- Parte 2: Dados Profissionais -->
            <div class="form-part" id="part2">
                <h2>Dados Profissionais</h2>
                <div class="form-grid">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="crm">CRM:</label>
                            <div class="custome-input">
                                <input type="text" id="crm" name="crmMedico" placeholder="CRM do médico" required>
                                <i class='bx bx-medal'></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="especializacao">Especialização:</label>
                            <div class="custome-input">
                                <input type="text" id="especializacao" name="especializacaoMedico" placeholder="Especialização principal" required>
                                <i class='bx bx-star'></i>
                            </div>
                        </div>
                    </div>
                    <div class="form-row">
                         <div class="form-group">
                            <label for="gestor_aprovador_id">ID do Gestor Aprovador (Opcional):</label>
                            <div class="custome-input">
                                <input type="text" id="gestor_aprovador_id" name="gestorAprovadorId" placeholder="ID do gestor responsável">
                                <i class='bx bx-user-check'></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <!-- Espaço reservado -->
                        </div>
                    </div>
                </div>
                <div class="form-footer">
                    <button type="button" class="login secondary" id="backToPart1">Voltar</button>
                    <button type="button" class="login" id="nextToPart3">Continuar</button>
                </div>
            </div>

            <!-- Parte 3: Endereço -->
            <div class="form-part" id="part3">
                <h2>Endereço Profissional</h2>
                <div class="form-grid">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="cep">CEP:</label>
                            <div class="custome-input">
                                <input type="text" id="cep" name="cep" placeholder="Digite o CEP" required>
                                <i class='bx bx-map-pin'></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="endereco">Logradouro:</label>
                            <div class="custome-input">
                                <input type="text" id="endereco" name="logradouro" placeholder="Rua, Avenida, etc." required>
                                <i class='bx bx-home'></i>
                            </div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="numero">Número:</label>
                            <div class="custome-input">
                                <input type="text" id="numero" name="numeroEndereco" placeholder="Número do imóvel" required>
                                <i class='bx bx-hash'></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="complemento">Complemento (Opcional):</label>
                            <div class="custome-input">
                                <input type="text" id="complemento" name="complementoEndereco" placeholder="Apartamento, sala, etc.">
                                <i class='bx bx-plus'></i>
                            </div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="cidade">Cidade:</label>
                            <div class="custome-input">
                                <input type="text" id="cidade" name="cidade" placeholder="Cidade" required>
                                <i class='bx bx-buildings'></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="estado">Estado:</label>
                            <div class="custome-input">
                                <input type="text" id="estado" name="estado" placeholder="UF" required>
                                <i class='bx bx-map'></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form-footer">
                    <button type="button" class="login secondary" id="backToPart2">Voltar</button>
                    <button type="submit" class="login">Finalizar Cadastro</button>
                </div>
            </div>
        </form>
        <div id="formResponseMessage" class="message" style="display: none; margin-top: 20px;"></div>
    </div>
    <script src="cadastroMedico.js"></script>
</body>

</html>
